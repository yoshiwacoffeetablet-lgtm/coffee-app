<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOSHIWA COFFEE</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: sans-serif;
  background-color: #f4f1ea; /* ナチュラルベージュ */
  text-align: center;
  padding: 20px;
  margin: 0;
}

/* タイトル */
h2 {
  color: #4a3f35;
  margin-top: 40px;
  margin-bottom: 30px;
  letter-spacing: 1px;
}

/* ボタン（森カラー） */
button {
  width: 90%;
  max-width: 320px;
  height: 64px;
  margin: 16px auto;
  font-size: 18px;

  border-radius: 12px;
  border: none;

  background: #4f6f52;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

button:active {
  background: #3f5c42;
}

/* QR */
#qr-reader {
  width: 90%;
  max-width: 320px;
  margin: 20px auto;
}

/* ガイド */
#qr-guide {
  margin-top: 10px;
  font-size: 15px;
  color: #6b5e53;
}

/* 結果 */
#resultText {
  font-size: 20px;
  line-height: 1.7;
  color: #4a3f35;
  margin-top: 40px;
}

/* 画面制御 */
.screen { display: none; }
.screen.active { display: block; }
</style>

</head>

<body>

<div id="menu" class="screen active">
  <h2>☕ YOSHIWA COFFEE</h2>

<button onclick="startQR()">☕ コーヒーを買う</button> <button onclick="showHistory()">📋 利用履歴を見る</button> <button onclick="sendMail()">📩 月次送信</button>

</div>

<div id="scan" class="screen">
  <div id="qr-reader"></div>
  <div id="qr-guide">ここに社員証（QR）をかざしてください</div>
  <button onclick="goMenu()">戻る</button>
</div>

<div id="result" class="screen">
  <div id="resultText"></div>
  <button onclick="goMenu()">戻る</button>
</div>

<script>

let employees = [];
let log = JSON.parse(localStorage.getItem('log') || '[]');
let html5QrCode;

// 社員CSV読み込み
async function loadEmployees(){
  const res = await fetch('./employees.csv?ver=' + new Date().getTime());
  const text = await res.text();

  const lines = text.split('\n');
  employees = [];

  lines.slice(1).forEach(line => {
    const [empNo, name] = line.split(',');
    if(empNo){
      employees.push({
        empNo: empNo.trim(),
        name: name.trim()
      });
    }
  });

  console.log("社員読み込み:", employees);
}

// 起動時
window.onload = function(){
  loadEmployees();
}

// 画面切替
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu(){
  show('menu');
}

// インカメQR起動
function startQR(){
  show('scan');

  html5QrCode = new Html5Qrcode("qr-reader");

  html5QrCode.start(
    { facingMode: "user" },
    { fps: 10, qrbox: 280 },
    (decodedText) => {
      html5QrCode.stop();
      handle(decodedText);
    }
  );
}

// メイン処理
function handle(empNo){

  if(employees.length === 0){
    alert("社員データ読み込み中です");
    return;
  }

  const emp = employees.find(e => e.empNo.trim() == empNo.trim());

  if(!emp){
    alert("社員が見つかりません");
    return;
  }

  log.push({
    empNo: emp.empNo,
    name: emp.name,
    time: new Date().toISOString()
  });

  localStorage.setItem('log', JSON.stringify(log));

  showResult(
    emp.name + " さん\n\n☕ コーヒー購入ありがとうございました\n\n今日もおつかれさまです"
  );
}

// 結果表示
function showResult(msg){
  document.getElementById('resultText').innerText = msg;
  show('result');
}

// 履歴表示
function showHistory(){
  let text = "";

  log.forEach(l=>{
    text += l.name + " " + new Date(l.time).toLocaleString() + "\n";
  });

  showResult(text || "履歴なし");
}

// メール送信（手動）
function sendMail(){

  if(log.length === 0){
    alert("データがありません");
    return;
  }

  let csv = "社員番号,名前,日時\n";

  log.forEach(item => {
    csv += `${item.empNo},${item.name},${new Date(item.time).toLocaleString()}\n`;
  });

  const now = new Date();
  const subject = `コーヒー利用履歴（${now.getFullYear()}年${now.getMonth()+1}月分）`;

  location.href =
    "mailto:yoshinoka@yoshiwa.co.jp" +
    "?subject=" + encodeURIComponent(subject) +
    "&body=" + encodeURIComponent(csv);
}

</script>

</body>
</html>
