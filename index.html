<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOSHIWA COFFEE</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: sans-serif;
  
  background-image: url("");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  text-align: center;
  padding: 20px;
}

h2 {
  font-size: 24px;
  margin-bottom: 30px;
}

/* ボタンをデカく */
button {
  width: 90%;
  max-width: 320px;
  padding: 18px;
  margin: 20px auto;
  font-size: 20px;
  border-radius: 16px;
  border: none;
  background: #6F4E37;
  color: white;
  display: block;
}

/* 押したとき */
button:active {
  background: #5a3d2b;
}

/* QR枠 */
#qr-reader {
  width: 90%;
  max-width: 300px;
  margin: 20px auto;
}

/* 結果表示も大きく */
#resultText {
  font-size: 22px;
  line-height: 1.6;
  margin: 30px 10px;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

</style>

</head>

<body>

<div id="menu" class="screen active">
  <h2>YOSHIWA COFFEE</h2>
  <button onclick="start('buy')">☕ コーヒーを買う</button>
  <button onclick="start('history')">📋 利用履歴を見る</button>
  <button onclick="sendMail()">📩 月次送信</button> 
</div>

<div id="scan" class="screen">
  <p>QRをかざすか、社員番号を入力</p>
  <div id="qr-reader"></div>
  <input id="manual" placeholder="社員番号">
  <br>
  <button onclick="manual()">入力で進む</button>
  <br><br>
  <button onclick="goMenu()">戻る</button>
</div>

<div id="result" class="screen">
  <h3 id="resultText"></h3>
  <button onclick="goMenu()">戻る</button>
</div>

<script>

let mode = 'buy';

let employees = [
  { empNo:'001', name:'田中太郎' },
  { empNo:'002', name:'山田花子' }
];

let log = JSON.parse(localStorage.getItem('log') || '[]');

let qr = null;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu(){
  stopQr();
  show('menu');
}

function start(m){
  mode = m;
  show('scan');
  startQr();
}

function startQr(){
  qr = new Html5Qrcode("qr-reader");

  qr.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      stopQr();
      handle(text);
    }
  );
}

function stopQr(){
  if(qr){
    qr.stop().catch(()=>{});
    qr = null;
  }
}

function manual(){
  const val = document.getElementById('manual').value;
  handle(val);
}

function getGreeting() {
  const hour = new Date().getHours();
  if (hour < 10) return "おはようございます ☀️";
  if (hour < 18) return "今日も良い一日を♪";
  return "おつかれさまです 🍵";
}

function handle(empNo){

  // 読み込み待ち
  if(employees.length === 0){
    alert("社員データ読み込み中。少し待ってください");
    return;
  }
  const emp = employees.find(e => e.empNo == empNo.trim());
  if(!emp){
    alert("社員が見つかりません");
    return;
  }

  if(mode==='buy'){
    log.push({
      empNo:emp.empNo,
      name:emp.name,
      time:new Date().toISOString()
    });
    localStorage.setItem('log', JSON.stringify(log));

    showResult(
      emp.name + " さん\n\n" +
      "☕ コーヒー購入ありがとうございました\n\n" +
      getGreeting()
    );
  }else{
    const history = log.filter(l=>l.empNo===emp.empNo);

    let text = emp.name + "\n\n";

    if(history.length===0){
      text += "履歴なし";
    }else{
      history.forEach(l=>{
        text += new Date(l.time).toLocaleString() + "\n";
      });
    }

    showResult(text);
  }
}

function showResult(msg){
  document.getElementById('resultText').innerText = msg;
  show('result');
}

function sendMail(){

  if(log.length === 0){
    alert("データがありません");
    return;
  }

  let csv = "社員番号,名前,日時\n";

  log.forEach(item => {
    csv += `${item.empNo},${item.name},${new Date(item.time).toLocaleString()}\n`;
  });

  const subject = "コーヒー購入履歴";
  const body = "以下、購入履歴です。\n\n" + csv;

  location.href =
    "mailto:yoshinoka@yoshiwa.co.jp" +
    "?subject=" + encodeURIComponent(subject) +
    "&body=" + encodeURIComponent(body);
}
async function loadEmployees(){
  const res = await fetch('./employees.csv?ver=' + new Date().getTime());
  const text = await res.text();

  const lines = text.split('\n');
  employees = [];

  lines.slice(1).forEach(line => {
    const [empNo, name] = line.split(',');
    if(empNo){
      employees.push({
        empNo: empNo.trim(),
        name: name.trim()
      });
    }
  });

  console.log("読み込み完了:", employees);
}

  
window.onload = function(){
  loadEmployees();
}
  
</script>

</body>
</html>
