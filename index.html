<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOSHIWA COFFEE</title>

  
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: sans-serif;
  background:#F5F0E8;
  text-align:center;
  padding:20px;
}
#qr-reader {
  border: 2px dashed #aaa;
  border-radius: 10px;
  padding: 10px;
  width:280px;
  margin:20px auto;
}

button {
  padding:12px 20px;
  margin:10px;
  font-size:16px;
}
.screen {
  display:none; 
}
.screen.active {
  display:block; 
}
</style>

</head>

<body>

<!-- メニュー -->

<div id="menu" class="screen active">
  <h2>YOSHIWA COFFEE</h2>
  <button onclick="start('buy')">買う</button>
  <button onclick="start('history')">履歴</button>
</div>

<!-- スキャン -->

<div id="scan" class="screen">
  <p>QRをかざすか、社員番号を入力</p>
  <p style="font-size:14px; color:#666;">
    カメラにQRをかざしてください
  </p>
  <div id="qr-reader"></div>

  <input id="manual" placeholder="社員番号">
  <br>
  <button onclick="manual()">入力で進む</button>

<br><br> <button onclick="goMenu()">戻る</button>

</div>

<!-- 結果 -->

<div id="result" class="screen">
  <h3 id="resultText"></h3>
  <button onclick="goMenu()">戻る</button>
</div>

<script>

// ===== データ =====
let mode = 'buy';

let employees = [
  { empNo:'001', name:'田中太郎' },
  { empNo:'002', name:'山田花子' }
];

let log = JSON.parse(localStorage.getItem('log') || '[]');

let qr = null;

// ===== 画面制御 =====
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu(){
  stopQr();
  show('menu');
}

// ===== 開始 =====
function start(m){
  mode = m;
  show('scan');
  startQr();
}

// ===== QR =====
function startQr(){
  qr = new Html5Qrcode("qr-reader");

  qr.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      stopQr();
      handle(text);
    }
  );
}

function stopQr(){
  if(qr){
    qr.stop().catch(()=>{});
    qr = null;
  }
}

// ===== 手入力 =====
function manual(){
  const val = document.getElementById('manual').value;
  handle(val);
}

// ===== 共通処理 =====
function handle(empNo){
  empNo = empNo.trim();//
  const emp = employees.find(e=>e.empNo===empNo);

  if(!emp){
    alert("社員が見つかりません");
    return;
  }

  if(mode==='buy'){
    log.push({
      empNo:emp.empNo,
      name:emp.name,
      time:new Date().toISOString()
    });
    localStorage.setItem('log', JSON.stringify(log));

    showResult(emp.name + " さん 購入完了");
  }else{
    const history = log.filter(l=>l.empNo===emp.empNo);

    let text = emp.name + "\n\n";

    if(history.length===0){
      text += "履歴なし";
    }else{
      history.forEach(l=>{
        text += new Date(l.time).toLocaleString() + "\n";
      });
    }

    showResult(text);
  }
}

// ===== 表示 =====
function showResult(msg){
  document.getElementById('resultText').innerText = msg;
  show('result');
}

</script>

</body>
</html>
