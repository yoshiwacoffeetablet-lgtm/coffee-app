<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOSHIWA COFFEE</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: sans-serif;

  background-image: url("https://raw.githubusercontent.com/yoshiwacoffeetablet-lgtm/coffee-app/main/%E9%9D%92%20%E3%83%99%E3%83%BC%E3%82%B8%E3%83%A5%20%E3%82%B7%E3%83%B3%E3%83%97%E3%83%AB%20%E3%82%B3%E3%83%BC%E3%83%92%E3%83%BC%20%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC.png");
  background-size: cover;
  background-position: center 40%;
  background-repeat: no-repeat;

  text-align: center;
  padding: 20px;
}

h2 {
  color: #6b4f3a;
  margin-top: 20px;
  margin-bottom: 30px;
  letter-spacing: 2px;
}

button {
  width: 90%;
  max-width: 320px;
  height: 70px;
  margin: 24px auto;
  font-size: 20px;
  border-radius: 30px;
  border: 2px solid rgba(255,255,255,0.7);

  background: rgba(120, 180, 180, 0.85);
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;

  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

button:active {
  background: rgba(100,160,160,1);
}

#qr-reader {
  width: 90%;
  max-width: 320px;
  margin: 20px auto;
}

#qr-guide {
  margin-top: 10px;
  font-size: 16px;
  color: #6b4f3a;
}

.screen {
  display: none;
}

.screen.active {
  display: block;
}

#resultText {
  font-size: 22px;
  line-height: 1.8;
  color: #6b4f3a;
  margin-top: 40px;
}
</style>

</head>

<body>

<div id="menu" class="screen active">
  <h2>☕ YOSHIWA COFFEE</h2>

<button onclick="startQR()">☕ コーヒーを買う</button> <button onclick="showHistory()">📋 利用履歴を見る</button> <button onclick="sendMail()">📩 月次送信</button>

</div>

<div id="scan" class="screen">
  <div id="qr-reader"></div>
  <div id="qr-guide">ここにかざしてください</div>
  <button onclick="goMenu()">戻る</button>
</div>

<div id="result" class="screen">
  <div id="resultText"></div>
  <button onclick="goMenu()">戻る</button>
</div>

<script>

let employees = [];
let log = JSON.parse(localStorage.getItem('log') || '[]');
let html5QrCode;

// CSV読み込み
async function loadEmployees(){
  const res = await fetch('./employees.csv?ver=' + new Date().getTime());
  const text = await res.text();

  const lines = text.split('\n');
  employees = [];

  lines.slice(1).forEach(line => {
    const [empNo, name] = line.split(',');
    if(empNo){
      employees.push({
        empNo: empNo.trim(),
        name: name.trim()
      });
    }
  });

  console.log("社員読み込み:", employees);
}

// 起動時
window.onload = function(){
  loadEmployees();
}

// 画面切替
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu(){
  show('menu');
}

// QR開始（インカメ）
function startQR(){
  show('scan');

  html5QrCode = new Html5Qrcode("qr-reader");

  html5QrCode.start(
    { facingMode: "user" },
    { fps: 10, qrbox: 280 },
    (decodedText) => {
      html5QrCode.stop();
      handle(decodedText);
    }
  );
}

// 処理
function handle(empNo){

  if(employees.length === 0){
    alert("読み込み中です");
    return;
  }

  const emp = employees.find(e => e.empNo.trim() == empNo.trim());

  if(!emp){
    alert("社員が見つかりません");
    return;
  }

  log.push({
    empNo: emp.empNo,
    name: emp.name,
    time: new Date().toISOString()
  });

  localStorage.setItem('log', JSON.stringify(log));

  showResult(
    emp.name + " さん\n\n☕ コーヒー購入ありがとうございました\n\nおつかれさまです"
  );
}

// 結果表示
function showResult(msg){
  document.getElementById('resultText').innerText = msg;
  show('result');
}

// 履歴
function showHistory(){
  let text = "";

  log.forEach(l=>{
    text += l.name + " " + new Date(l.time).toLocaleString() + "\n";
  });

  showResult(text || "履歴なし");
}

// メール送信
function sendMail(){

  if(log.length === 0){
    alert("データがありません");
    return;
  }

  let csv = "社員番号,名前,日時\n";

  log.forEach(item => {
    csv += `${item.empNo},${item.name},${new Date(item.time).toLocaleString()}\n`;
  });

  location.href =
    "mailto:yoshinoka@yoshiwa.co.jp" +
    "?subject=" + encodeURIComponent("コーヒー利用履歴") +
    "&body=" + encodeURIComponent(csv);
}

</script>

</body>
</html>
